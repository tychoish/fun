name: ci
on:
  pull_request:
    paths:
      - "**.go"
    branches:
      - main
  push:
    paths:
      - "**.go"
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: technote-space/get-diff-action@v6
        with:
          PATTERNS: |
            **/**.go
            go.mod
            go.sum
      - uses: actions/setup-go@v5
        if: env.GIT_DIFF
        with:
          go-version: "1.25"
      - name: go test
        if: env.GIT_DIFF
        run: |
          go test -race -cover -timeout=5m ./...

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: technote-space/get-diff-action@v6
        with:
          PATTERNS: |
            **/**.go
            go.mod
            go.sum
      - uses: actions/setup-go@v5
        if: env.GIT_DIFF
        with:
          go-version: "1.25"
      - uses: golangci/golangci-lint-action@v7
        if: env.GIT_DIFF
        with:
          version: v2.9.0
          args: --timeout 8m
          github-token: ${{ secrets.github_token }}
